# ============================================
# TestApp Docker Compose - Base Configuration
# ============================================

version: '3.8'

services:
  testapp:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: testapp
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    networks:
      - testapp-network

networks:
  testapp-network:
    driver: bridge
