# ============================================
# TestApp Kubernetes ConfigMap
# ============================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: testapp-config
  namespace: testapp
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  PORT: "3000"
  API_VERSION: "v1"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX_REQUESTS: "100"
