# ============================================
# TestApp Kubernetes Service
# ============================================

apiVersion: v1
kind: Service
metadata:
  name: testapp
  namespace: testapp
  labels:
    app: testapp
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: testapp
